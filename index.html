// also explicitly focuses a popup's close button when it opens (a

// that's a direct .focus() call from their code, not a side effect of a
// click, so it wasn't covered. Patching focus() itself to always skip the
// scroll catches that case and any other source, ours or theirs.
const nativeFocus = HTMLElement.prototype.focus;
HTMLElement.prototype.focus = function (options) {
  nativeFocus.call(this, Object.assign({}, options, { preventScroll: true }));
};

map.getCanvas().removeAttribute('tabindex');

const TYPES = ['Hotels', 'Cafe', 'Restaurants', 'Attractions'];
const DEFAULT_VIEW = { center: [-122.3465, 47.62025], zoom: 13.6 };

function loadIcon(id, src, width, height) {
  return new Promise((resolve, reject) => {
    const img = new Image(width, height);
    img.onload = () => {
      if (!map.hasImage(id)) map.addImage(id, img, { pixelRatio: 2 });
      resolve();
    };
    img.onerror = reject;
    img.src = src;
  });
}

map.on('load', async () => {
  // Load all custom icons (amenity badges at 96x96 source px, the taller
  // Westlake pin at 132x192 to preserve its aspect ratio) before adding
  // any layers that reference them.
  await Promise.all([
    loadIcon('Hotels', ICONS.Hotels, 96, 96),
    loadIcon('Cafe', ICONS.Cafe, 96, 96),
    loadIcon('Restaurants', ICONS.Restaurants, 96, 96),
    loadIcon('Attractions', ICONS.Attractions, 96, 96),
    loadIcon('WestlakeIcon', ICONS.WestlakeIcon, 132, 192)
  ]);

  map.addSource('amenities', { type: 'geojson', data: amenitiesGeoJSON });
  map.addSource('marker', { type: 'geojson', data: markerGeoJSON });

  // One symbol layer per amenity type so each can be toggled independently
  TYPES.forEach(type => {
    map.addLayer({
      id: `poi-${type}`,
      type: 'symbol',
      source: 'amenities',
      filter: ['==', ['get', 'Type'], type],
      layout: {
        'icon-image': ['get', 'Type'],
        'icon-size': 0.6,
        'icon-allow-overlap': true,
        'icon-ignore-placement': true,
        'visibility': 'visible'
      }
    });
  });

  // Main property marker — bigger, always on top, no hover/click for now
  map.addLayer({
    id: 'westlake-marker',
    type: 'symbol',
    source: 'marker',
    layout: {
      'icon-image': 'WestlakeIcon',
      'icon-size': 1,
      'icon-anchor': 'bottom',
      'icon-allow-overlap': true
    }
  });
  // Belt-and-suspenders: explicitly move it to the very top of the layer
  // stack (addLayer already does this by default with no second argument,
  // but this makes the intent explicit and protects against anything added
  // above it later, in code or in the Mapbox Studio style itself).
  map.moveLayer('westlake-marker');

  // --- Hover (name only) + click (name + website link) ------------------
  // Two separate popups: hovering just previews the name, which avoids a
  // common gotcha where a hover popup with a clickable link disappears the
  // moment your cursor leaves the icon on the way to the link. Clicking
  // opens a popup that stays put (with a close button) so the link is
  // actually clickable — and works the same way on touch/mobile.
  const hoverPopup = new mapboxgl.Popup({
    closeButton: false,
    closeOnClick: false,
    offset: 14,
    className: 'poi-popup'
  });
  const clickPopup = new mapboxgl.Popup({
    closeButton: true,
    closeOnClick: true,
    offset: 14,
    className: 'poi-popup'
  });

  TYPES.forEach(type => {
    const layerId = `poi-${type}`;

    map.on('mousemove', layerId, (e) => {
      map.getCanvas().style.cursor = 'pointer';
      const f = e.features[0];
      hoverPopup
        .setLngLat(f.geometry.coordinates)
        .setHTML(`<p class="poi-popup-name">${f.properties.Name}</p>`)
        .addTo(map);
    });

    map.on('mouseleave', layerId, () => {
      map.getCanvas().style.cursor = '';
      hoverPopup.remove();
    });

    map.on('click', layerId, (e) => {
      hoverPopup.remove();
      const f = e.features[0];
      const name = f.properties.Name;
      const link = f.properties.Link;
      let html = `<p class="poi-popup-name">${name}</p>`;
      if (link) {
        html += `<a class="poi-popup-link" href="${link}" target="_blank" rel="noopener">Visit website →</a>`;
      }
      clickPopup.setLngLat(f.geometry.coordinates).setHTML(html).addTo(map);
    });
  });

  // --- Category buttons: click isolates that type + opens a name list ----
  // Clicking Hotels/Cafe/Restaurants/Attractions hides the other three,
  // shows only that type, and lists every place in it on the side panel.
  // Clicking a name in that list flies to it and opens its popup. "Show
  // All" returns to the default view with every category visible again.
  let activeType = null; // null = all categories visible (default state)

  const listPanel = document.getElementById('poi-list-panel');
  const listHeader = document.getElementById('poi-list-header');
  const listTitle = document.getElementById('poi-list-title');
  const listItems = document.getElementById('poi-list-items');
  const markerCoords = markerGeoJSON.features[0].geometry.coordinates;

  // Same colors as the buttons, with readable text on each (yellow needs a
  // dark label rather than white to stay legible).
  const TYPE_STYLE = {
    Hotels:       { bg: '#5dbb57', fg: '#ffffff' },
    Cafe:         { bg: '#ed8430', fg: '#ffffff' },
    Restaurants:  { bg: '#f5c01a', fg: '#3a2c00' },
    Attractions:  { bg: '#165ca7', fg: '#ffffff' }
  };

  // Keep the list panel positioned just under the button row, however tall
  // that row currently is (it can wrap to two lines on a narrow embed).
  function positionListPanel() {
    const controlsRect = document.getElementById('map-controls').getBoundingClientRect();
    listPanel.style.top = (controlsRect.bottom + 10) + 'px';
  }
  positionListPanel();
  window.addEventListener('resize', positionListPanel);

  function flyToFeature(f) {
    // Fit both the selected place AND the 2201 Westlake marker in view,
    // rather than just centering on the place and potentially pushing the
    // property off-screen. Left padding needs to clear not just the list
    // panel itself, but also the popup that opens on the marker (it's
    // ~240px wide and centered on the point), or the popup's left side
    // ends up rendered underneath the panel.
    const bounds = new mapboxgl.LngLatBounds();
    bounds.extend(markerCoords);
    bounds.extend(f.geometry.coordinates);
    map.fitBounds(bounds, {
      padding: { top: 70, bottom: 60, left: 410, right: 60 },
      maxZoom: 17
    });

    const name = f.properties.Name;
    const link = f.properties.Link;
    let html = `<p class="poi-popup-name">${name}</p>`;
    if (link) {
      html += `<a class="poi-popup-link" href="${link}" target="_blank" rel="noopener">Visit website →</a>`;
    }
    hoverPopup.remove();
    clickPopup.setLngLat(f.geometry.coordinates).setHTML(html).addTo(map);
  }

  function renderList(type) {
    const features = amenitiesGeoJSON.features
      .filter(f => f.properties.Type === type)
      .slice()
      .sort((a, b) => a.properties.Name.localeCompare(b.properties.Name));

    const style = TYPE_STYLE[type];
    listHeader.style.background = style.bg;
    listHeader.style.color = style.fg;
    listTitle.textContent = `${type} (${features.length})`;
    listItems.innerHTML = '';

    features.forEach(f => {
      const li = document.createElement('li');
      li.textContent = f.properties.Name;
      li.addEventListener('click', () => {
        listItems.querySelectorAll('li').forEach(el => el.classList.remove('selected'));
        li.classList.add('selected');
        flyToFeature(f);
      });
      listItems.appendChild(li);
    });

    listPanel.classList.add('open');
  }

  function isolateType(type) {
    if (type === activeType) return;
    activeType = type;
    TYPES.forEach(t => {
      const visible = t === type;
      map.setLayoutProperty(`poi-${t}`, 'visibility', visible ? 'visible' : 'none');
      document.getElementById(t).classList.toggle('active', visible);
    });
    renderList(type);
  }

  function showAllCategories() {
    activeType = null;
    TYPES.forEach(t => {
      map.setLayoutProperty(`poi-${t}`, 'visibility', 'visible');
      document.getElementById(t).classList.add('active');
    });
    listPanel.classList.remove('open');
    clickPopup.remove();
  }

  function resetToDefault() {
    showAllCategories();
    map.flyTo({ center: DEFAULT_VIEW.center, zoom: DEFAULT_VIEW.zoom });
  }

  TYPES.forEach(type => {
    document.getElementById(type).addEventListener('click', () => isolateType(type));
  });
  document.getElementById('showAll').addEventListener('click', resetToDefault);
  document.getElementById('poi-list-close').addEventListener('click', () => {
    listPanel.classList.remove('open');
  });
});
</script>
</body>
</html>
